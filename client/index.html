          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We verify six areas: (1) Legal entity — GST registration, IEC code, physical facility confirmed; (2) Export history — verified through DGFT and customs data; (3) Certifications — FSSAI, APEDA, Spices Board, organic certificates validated directly with issuing bodies; (4) Lab testing — independent third-party testing on the actual batch for pesticide MRL, heavy metals, microbial, and active compounds; (5) Supply chain traceability — source region and processing facility; (6) Commercial reality — actual MOQ, price benchmark, lead time. Every report concludes with a clear Proceed / Proceed with Conditions / Do Not Proceed recommendation."
          }
        },
        {
          "@type": "Question",
          "name": "Which countries does Mizuron Global serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our current focus markets are Singapore, Japan, South Korea, and Southeast Asia (Thailand, Vietnam, Indonesia, Malaysia, Philippines). We specialise in Japan's Food Sanitation Act and MHLW positive list requirements, Korea's MFDS import protocols, Singapore's HSA and SFA documentation requirements, and ASEAN regulatory frameworks for Indian-origin ingredients."
          }
        },

        <h1>Mizuron Global — Independent Indian Supplier Verification for Japan, Korea, Singapore &amp; Southeast Asia</h1>
        <p>
          Mizuron Global provides independent, buyer-side verification of Indian spice and
          Ayurvedic ingredient suppliers for food and wellness manufacturers in Japan, Korea,
          Singapore, Thailand, Vietnam, Indonesia, Malaysia, and the Philippines.
          We verify suppliers on the ground in India — covering legal entity, export history,
          FSSAI/APEDA certifications, independent lab testing, supply chain traceability,
          and commercial accuracy. Documentation is built for your specific regulatory market:
          Japan (MHLW, Food Sanitation Act), Korea (MFDS), Singapore (HSA/SFA), Southeast Asia (ASEAN).
        </p>
        <p>
          We work exclusively for the buyer and accept zero payments from Indian suppliers.
          Every engagement produces a clear Proceed / Proceed with Conditions / Do Not Proceed recommendation.
        </p>
        <h2>Services</h2>
        <ul>
          <li>Supplier Verification Report — independent due diligence on an Indian ingredient supplier (USD 1,200–2,500, 3–4 weeks)</li>
          <li>Documentation Retainer — ongoing monthly compliance management for active supplier relationships (USD 600–2,800/month)</li>
          <li>Full Sourcing Project — find, verify, and facilitate your first order with a new Indian ingredient supplier (USD 3,500–12,000)</li>
        </ul>
        <h2>Ingredient Categories</h2>
        <p>Indian Spices: turmeric (curcumin-verified), black pepper, ginger, cumin, cardamom, coriander, fenugreek, fennel, spice extracts and oleoresins.</p>
        <p>Ayurvedic Wellness: ashwagandha (withanolide-verified), brahmi, shatavari, triphala, neem, moringa, standardised herbal extracts for nutraceutical manufacturers.</p>

        <ul>
          <li>Japan — MHLW Food Sanitation Act, positive list pesticide compliance, JETRO standards</li>
